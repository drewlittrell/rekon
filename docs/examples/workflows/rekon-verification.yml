# Rekon Verification — alpha GitHub Actions workflow template.
#
# **This is a template, not an active workflow.** Copy it into your
# repo's `.github/workflows/` directory (renaming as you like) to
# enable. The Rekon repository itself does NOT install this
# workflow.
#
# Safety contract pinned by
# `docs/strategy/verification-runner-ci-github-decision.md`:
#
#   - GitHub status is not canonical truth; Rekon artifacts remain
#     canonical.
#   - Forked PRs must not receive secret-bearing execution by
#     default.
#   - The workflow uses ONLY `permissions: contents: read`.
#   - No `pull-requests: write`, `checks: write`, `contents: write`,
#     or `id-token: write`.
#   - No `pull_request_target` trigger.
#   - No secrets declared.
#   - Raw command logs (`.log` files) are excluded from the upload.
#   - The job summary is a downstream surface, not an
#     authoritative proof record.
#   - Passing verification does not automatically resolve findings.

name: Rekon Verification

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: npm run build

      - name: Rekon refresh
        run: node packages/cli/dist/index.js refresh --root . --json

      - name: Resolve latest VerificationPlan
        id: plan
        # `rekon artifacts latest` is a read-only helper that reads
        # the local Rekon artifact index. It does not refresh,
        # execute, publish, or validate by itself.
        # `--id-only` emits a typed `<type>:<id>` ref;
        # `--allow-missing` lets the workflow continue (with an
        # empty output) when no VerificationPlan exists yet.
        run: |
          ID="$(node packages/cli/dist/index.js artifacts latest \
            --root . --type VerificationPlan --id-only --allow-missing)"
          echo "ref=$ID" >> "$GITHUB_OUTPUT"
          echo "id=${ID#VerificationPlan:}" >> "$GITHUB_OUTPUT"

      - name: Rekon verify run (execute)
        # The runner enforces shell:false, a scrubbed env,
        # per-command + per-plan timeouts, bounded redacted log
        # excerpts, and sha256 stream digests. To preview without
        # spawning processes, swap `--execute` for `--dry-run`.
        if: steps.plan.outputs.id != ''
        run: |
          node packages/cli/dist/index.js verify run \
            --root . \
            --plan "${{ steps.plan.outputs.id }}" \
            --execute \
            --json > .rekon/verify-run.json

      - name: Resolve latest VerificationRun
        id: run
        if: steps.plan.outputs.id != ''
        # Same read-only helper. Reads the artifact index after
        # the execute step wrote the VerificationRun.
        run: |
          ID="$(node packages/cli/dist/index.js artifacts latest \
            --root . --type VerificationRun --id-only --allow-missing)"
          echo "ref=$ID" >> "$GITHUB_OUTPUT"
          echo "id=${ID#VerificationRun:}" >> "$GITHUB_OUTPUT"

      - name: Rekon verify result from-run
        if: steps.run.outputs.id != ''
        run: |
          node packages/cli/dist/index.js verify result from-run \
            --root . \
            --run "${{ steps.run.outputs.id }}" \
            --json

      - name: Rekon publish proof
        if: always()
        run: node packages/cli/dist/index.js publish proof --root . --json

      - name: Rekon publish architecture summary
        if: always()
        run: node packages/cli/dist/index.js publish architecture --root . --json

      - name: Rekon publish agent contract
        if: always()
        run: node packages/cli/dist/index.js publish agent-contract --root . --json

      - name: Rekon artifacts validate
        if: always()
        run: node packages/cli/dist/index.js artifacts validate --root . --json

      - name: Resolve latest proof-report Publication
        id: proof
        if: always()
        # Same read-only helper; `--kind proof-report` filters by
        # Publication body kind without reading every artifact.
        run: |
          ID="$(node packages/cli/dist/index.js artifacts latest \
            --root . --type Publication --kind proof-report \
            --id-only --allow-missing)"
          echo "ref=$ID" >> "$GITHUB_OUTPUT"

      - name: Append proof report to job summary
        if: always()
        # GitHub Actions writes anything appended to
        # `$GITHUB_STEP_SUMMARY` to the job's summary page. No API
        # permissions required; the file is on the runner
        # filesystem. The job summary is a downstream surface, not
        # canonical proof.
        run: |
          {
            echo "# Rekon Verification Summary"
            echo ""
            if [ -n "${{ steps.run.outputs.id }}" ]; then
              echo "- VerificationRun: \`${{ steps.run.outputs.id }}\`"
            fi
            if [ -n "${{ steps.plan.outputs.id }}" ]; then
              echo "- VerificationPlan: \`${{ steps.plan.outputs.id }}\`"
            fi
            if [ -n "${{ steps.proof.outputs.ref }}" ]; then
              echo "- Proof report: \`${{ steps.proof.outputs.ref }}\`"
            fi
            echo ""
            echo "Uploaded artifact: \`rekon-artifacts\`"
            echo ""
            echo "_GitHub status is not canonical truth; Rekon artifacts remain canonical._"
            echo ""
            if [ -f .rekon/artifacts/publications/proof-report.md ]; then
              echo "---"
              echo ""
              cat .rekon/artifacts/publications/proof-report.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Rekon artifacts
        if: always()
        # Uploads `.rekon/artifacts` as the canonical proof record
        # for this CI run. `.log` files are excluded explicitly as
        # belt-and-braces; the Rekon runner's redaction +
        # truncation contract already keeps raw stdout/stderr out
        # of the artifact bodies.
        uses: actions/upload-artifact@v4
        with:
          name: rekon-artifacts
          path: |
            .rekon/artifacts/**
            !.rekon/artifacts/**/*.log
          retention-days: 7
