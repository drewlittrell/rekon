# Rekon Verification — alpha GitHub Actions workflow template
# (dry-run variant).
#
# **This is a TRIAL template, not an active workflow.** It is
# intentionally safer than the `rekon-verification.yml` variant:
# it runs `rekon verify run --dry-run` instead of `--execute`, so
# no plan commands are spawned at all. Use this template first
# when adopting Rekon in CI to confirm the artifact-upload +
# job-summary plumbing before any plan commands run on the
# runner.
#
# **After copying, validate the file:**
#
#   node packages/cli/dist/index.js verify github-workflow validate \
#     --path .github/workflows/rekon-verification-dry-run.yml --json
#
# The validator is static, read-only, and does not call GitHub. It
# checks the alpha safety contract (no `pull_request_target`, no
# write permissions, uses `rekon artifacts latest`, uploads
# `.rekon/artifacts` excluding logs, writes the job summary).
#
# Safety contract — identical to the execute variant:
#
#   - GitHub status is not canonical truth; Rekon artifacts
#     remain canonical.
#   - Forked PRs must not receive secret-bearing execution by
#     default.
#   - `permissions: contents: read` ONLY. No
#     `pull-requests: write`, `checks: write`,
#     `contents: write`, or `id-token: write`.
#   - No `pull_request_target` trigger.
#   - No secrets declared.
#   - No GitHub API writes anywhere.
#   - Raw command logs (`.log` files) are excluded from the
#     upload.
#
# Dry-run-specific behaviour:
#
#   - `rekon verify run --plan <id> --dry-run` writes a
#     planned-but-not-run VerificationRun artifact and spawns
#     **zero** processes.
#   - The workflow does NOT call `verify result from-run` — a
#     dry-run is not proof. See
#     `docs/strategy/verification-runner-v1-decision.md` step
#     3 for the contract.
#   - `publish proof` / `architecture` / `agent-contract` still
#     run so the publications + job summary stay current.

name: Rekon Verification (dry-run)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: npm run build

      - name: Rekon refresh
        run: node packages/cli/dist/index.js refresh --root . --json

      - name: Resolve latest VerificationPlan
        id: plan
        # Read-only helper. Reads the local Rekon artifact index;
        # does not refresh, execute, publish, or validate.
        run: |
          ID="$(node packages/cli/dist/index.js artifacts latest \
            --root . --type VerificationPlan --id-only --allow-missing)"
          echo "ref=$ID" >> "$GITHUB_OUTPUT"
          echo "id=${ID#VerificationPlan:}" >> "$GITHUB_OUTPUT"

      - name: Rekon verify run (dry-run)
        if: steps.plan.outputs.id != ''
        # Dry-run validates each plan command against the safety
        # contract (rejects shell-control operators, command
        # substitution, env-assignment prefixes, newlines, empty
        # commands) and writes a planned-but-not-run
        # VerificationRun. **No process is spawned.** Swap for
        # the execute workflow only after reviewing the plan's
        # commands.
        run: |
          node packages/cli/dist/index.js verify run \
            --root . \
            --plan "${{ steps.plan.outputs.id }}" \
            --dry-run \
            --json > .rekon/verify-run.json

      - name: Resolve latest VerificationRun
        id: run
        if: steps.plan.outputs.id != ''
        run: |
          ID="$(node packages/cli/dist/index.js artifacts latest \
            --root . --type VerificationRun --id-only --allow-missing)"
          echo "ref=$ID" >> "$GITHUB_OUTPUT"
          echo "id=${ID#VerificationRun:}" >> "$GITHUB_OUTPUT"

      # Intentionally omitted in dry-run: `verify result
      # from-run`. A dry-run is not proof — the helper refuses
      # `not-run` runs by default. See
      # docs/concepts/verification-runs.md.

      - name: Rekon publish proof
        if: always()
        run: node packages/cli/dist/index.js publish proof --root . --json

      - name: Rekon publish architecture summary
        if: always()
        run: node packages/cli/dist/index.js publish architecture --root . --json

      - name: Rekon publish agent contract
        if: always()
        run: node packages/cli/dist/index.js publish agent-contract --root . --json

      - name: Rekon artifacts validate
        id: validate
        if: always()
        run: |
          OUTPUT="$(node packages/cli/dist/index.js artifacts validate --root . --json || true)"
          echo "$OUTPUT"
          VALID="$(node -e "process.stdout.write(String(JSON.parse(process.argv[1]).valid))" "$OUTPUT")"
          echo "valid=$VALID" >> "$GITHUB_OUTPUT"

      - name: Resolve latest proof-report Publication
        id: proof
        if: always()
        run: |
          ID="$(node packages/cli/dist/index.js artifacts latest \
            --root . --type Publication --kind proof-report \
            --id-only --allow-missing)"
          echo "ref=$ID" >> "$GITHUB_OUTPUT"

      - name: Resolve latest architecture-summary Publication
        id: arch
        if: always()
        run: |
          ID="$(node packages/cli/dist/index.js artifacts latest \
            --root . --type Publication --kind architecture-summary \
            --id-only --allow-missing)"
          echo "ref=$ID" >> "$GITHUB_OUTPUT"

      - name: Resolve latest agent-contract Publication
        id: contract
        if: always()
        run: |
          ID="$(node packages/cli/dist/index.js artifacts latest \
            --root . --type Publication --kind agent-contract \
            --id-only --allow-missing)"
          echo "ref=$ID" >> "$GITHUB_OUTPUT"

      - name: Append summary to job summary
        if: always()
        # GitHub Actions writes anything appended to
        # `$GITHUB_STEP_SUMMARY` to the job's summary page. No
        # API permissions required; the file is on the runner
        # filesystem. The job summary is a downstream surface,
        # not canonical proof.
        run: |
          {
            echo "# Rekon Verification Summary"
            echo ""
            echo "- Mode: dry-run"
            echo "- VerificationPlan: ${{ steps.plan.outputs.ref || 'missing' }}"
            echo "- VerificationRun: ${{ steps.run.outputs.ref || 'missing' }}"
            echo "- VerificationResult: not produced (dry-run is not proof)"
            echo "- Proof report: ${{ steps.proof.outputs.ref || 'missing' }}"
            echo "- Architecture summary: ${{ steps.arch.outputs.ref || 'missing' }}"
            echo "- Agent contract: ${{ steps.contract.outputs.ref || 'missing' }}"
            echo "- Artifacts valid: ${{ steps.validate.outputs.valid || 'unknown' }}"
            echo "- Uploaded artifact: \`rekon-artifacts\`"
            echo ""
            echo "_GitHub status is not canonical truth; Rekon artifacts remain canonical._"
            echo ""
            if [ -f .rekon/artifacts/publications/proof-report.md ]; then
              echo "---"
              echo ""
              cat .rekon/artifacts/publications/proof-report.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Rekon artifacts
        if: always()
        # Uploads `.rekon/artifacts` as the canonical proof
        # record for this CI run. `.log` files are excluded
        # explicitly as belt-and-braces; the Rekon runner's
        # redaction + truncation contract already keeps raw
        # stdout/stderr out of artifact bodies.
        uses: actions/upload-artifact@v4
        with:
          name: rekon-artifacts
          path: |
            .rekon/artifacts/**
            !.rekon/artifacts/**/*.log
          retention-days: 7
